<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>金曲猜歌王</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>

  <!-- ===== 大廳畫面 ===== -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-container">
      <h1 class="game-title">金曲猜歌王</h1>
      <p class="subtitle">多人連線猜歌桌遊</p>
      <div id="game-rules-container" class="game-rules-brief"></div>

      <div class="lobby-card">
        <label for="player-name">你的暱稱</label>
        <input type="text" id="player-name" placeholder="輸入暱稱..." maxlength="10">

        <label for="mode-select">遊戲模式</label>
        <select id="mode-select">
          <option value="music">🎵 金曲猜歌王</option>
          <option value="movie">🎬 電影猜猜王</option>
          <option value="ad">📺 廣告猜猜王</option>
          <option value="anime">🎌 動漫猜猜王</option>
        </select>

        <label for="lang-select">分類篩選</label>
        <select id="lang-select">
          <option value="全部">全部</option>
        </select>

        <div class="lobby-actions">
          <button id="btn-create-room" disabled>建立房間</button>
          <div class="divider-text">或</div>
          <div class="join-row">
            <input type="text" id="room-code-input" placeholder="輸入房間代碼" maxlength="6">
            <button id="btn-join-room" disabled>加入房間</button>
          </div>
        </div>

        <div id="rejoin-section" style="display:none; margin-top:1rem;">
          <button id="btn-rejoin" class="btn-primary" style="width:100%; background:var(--accent); color:#000;">重新加入房間 <span id="rejoin-room-code"></span></button>
          <button id="btn-rejoin-dismiss" style="width:100%; margin-top:0.4rem; padding:0.5rem; background:transparent; border:none; color:var(--text-muted); font-size:0.85rem; cursor:pointer;">不了，開新遊戲</button>
        </div>
        <div id="loading-status" class="loading-status">正在載入題庫...</div>
      </div>
    </div>
  </div>

  <!-- ===== 等待室畫面 ===== -->
  <div id="screen-waiting" class="screen">
    <div class="waiting-container">
      <h2>房間 <span id="display-room-code"></span></h2>
      <button id="btn-copy-code" class="btn-copy-code">📋 複製代碼</button>
      <button id="btn-copy-link" class="btn-copy-code">📋 複製邀請連結</button>
      <div id="qr-container" style="margin: 1rem auto; text-align: center;">
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem;">掃描 QR Code 加入房間</p>
      </div>
      <div id="player-list" class="player-list"></div>
      <div id="host-settings" style="display:none; margin-bottom: 1rem;">
        <label for="win-score-input-waiting" style="color: var(--text-muted); font-size: 0.85rem;">勝利分數</label>
        <input type="number" id="win-score-input-waiting" value="5" min="1" max="99" style="width: 100%; padding: 0.5rem; border-radius: var(--radius-sm); background: var(--bg); color: var(--text); border: 1px solid #333; margin-top: 0.3rem;">
      </div>
      <button id="btn-start-game" class="btn-primary" style="display:none;">開始遊戲</button>
      <p id="waiting-hint" class="hint">等待房主開始遊戲...</p>
    </div>
  </div>

  <!-- ===== 遊戲主畫面 ===== -->
  <div id="screen-game" class="screen">
    <div class="game-layout">

      <!-- 左側 / 上方：時間軸 -->
      <div class="timeline-panel">
        <div class="game-menu-bar">
          <div class="game-room-info">房間 <span id="game-room-code"></span></div>
          <div class="game-menu-wrapper">
            <button class="btn-game-menu" id="btn-game-menu" title="遊戲選單">⋯</button>
            <div class="game-menu-dropdown" id="game-menu-dropdown">
              <button id="btn-menu-restart">🔄 重新開始</button>
              <button id="btn-menu-end" class="menu-danger">🚪 結束遊戲</button>
            </div>
          </div>
        </div>
        <div class="game-info-bar">
          <span id="current-turn-label">輪到：---</span>
          <span id="win-score-label" class="win-score-label"></span>
          <span id="round-label">第 1 回合</span>
        </div>
        <div id="phase-status" class="phase-status"></div>
        <div class="scoreboard" id="scoreboard"></div>
        <h3 class="timeline-title" id="timeline-owner-label">我的時間軸</h3>
        <div id="timeline" class="timeline"></div>
        <div id="my-timeline-section" style="display:none;">
          <h3 class="timeline-title" id="my-timeline-label">我的時間軸</h3>
          <div id="my-timeline" class="timeline"></div>
        </div>
      </div>

      <!-- 右側 / 下方：操作區 -->
      <div class="control-panel">
        <!-- 音樂播放區 -->
        <div id="music-section" class="music-section">
          <div class="player-wrapper">
            <div id="yt-player-container">
              <div id="yt-player"></div>
              <div id="yt-mask" class="yt-mask">
                <span class="mask-icon">🎵</span>
              </div>
            </div>
          </div>
          <div class="playback-controls">
            <button id="btn-play" class="btn-play" disabled>▶ 播放</button>
            <button id="btn-replay" class="btn-replay" style="display:none;">🔁 重播</button>
            <div id="timer-display" class="timer-display">30s</div>
            <button id="btn-swap" class="btn-swap" style="display:none;">🔄 換歌 (-1 籌碼)</button>
            <button id="btn-direct-score" class="btn-direct" style="display:none;">💰 直接得分 (-3 籌碼)</button>
          </div>
        </div>

        <!-- 階段倒計時 -->
        <div id="phase-timer-bar" class="phase-timer-bar" style="display:none;">
          <span>剩餘時間</span>
          <div class="phase-timer-progress"><div id="phase-timer-fill" class="phase-timer-fill"></div></div>
          <span id="phase-timer-count" class="phase-timer-count">60s</span>
        </div>

        <!-- 猜題區 -->
        <div id="guess-section" class="guess-section" style="display:none;">
          <h3>🎯 猜年代</h3>
          <p class="section-hint">聽完歌曲後，點擊時間軸上的「＋」將歌曲插入你認為正確的年代位置。猜對歌手＋歌名可額外獲得 1 籌碼</p>
          <input type="text" id="guess-artist" placeholder="猜歌手（選填）..." autocomplete="off">
          <input type="text" id="guess-title" placeholder="猜歌名（選填）..." autocomplete="off">
          <button id="btn-submit-placement" class="btn-primary" disabled>確認放置</button>
        </div>

        <!-- 下注區 (其他玩家) -->
        <div id="betting-section" class="betting-section" style="display:none;">
          <h3>🎰 下注猜年代</h3>
          <p class="bet-hint">點擊「＋」選擇你認為正確的位置（-1 籌碼），再點一次取消</p>
          <p class="section-hint">猜對歌手＋歌名 → 最快答對者 +1 籌碼</p>
          <div id="bet-timeline" class="timeline betting-timeline"></div>
          <div class="bet-guess-row">
            <input type="text" id="bet-guess-artist" placeholder="搶答歌手（選填）..." autocomplete="off">
            <input type="text" id="bet-guess-title" placeholder="搶答歌名（選填）..." autocomplete="off">
          </div>
          <button id="btn-submit-bet" class="btn-primary" disabled>確認提交</button>
        </div>

        <!-- 結算區 -->
        <div id="reveal-section" class="reveal-section" style="display:none;">
          <div id="reveal-content"></div>
          <button id="btn-next-round" class="btn-primary" style="display:none;">下一回合</button>
          <button id="btn-back-lobby" class="btn-primary" style="display:none; margin-top:0.75rem;">🏠 回到大廳</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-dialog">
      <h3 id="confirm-title">確認</h3>
      <p id="confirm-message">確定要執行此操作嗎？</p>
      <div class="confirm-actions">
        <button class="btn-confirm-cancel" id="btn-confirm-cancel">取消</button>
        <button class="btn-confirm-ok" id="btn-confirm-ok">確定</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
